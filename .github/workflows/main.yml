name: Monthly Industry News Report

permissions:
  contents: write

on:
  workflow_dispatch:
  schedule:
    # 每月 1 號 01:00 UTC（台灣 09:00）
    - cron: '0 1 1 * *'

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ 拿 repo 內容
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2️⃣ 設定 Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # 3️⃣ 安裝套件 (現在不需要安裝 google-generativeai 了，更輕量)
      - name: Install dependencies
        run: |
          pip install python-docx

      # 4️⃣ 跑你的 main.py
      - name: Run main script
        run: python main.py
        env:
          # 保留 Email 設定即可，不需要 GEMINI_API_KEY 了
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}

      # 5️⃣ 把產出的 Word 指令檔存回 repo
      - name: Commit output files
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add report_instruction_*.docx || echo "No files to add"
          git commit -m "Monthly auto-generated AI prompt instruction" || echo "No changes to commit"
          git push
