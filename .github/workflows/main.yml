name: Monthly Industry News Report

permissions:
  contents: write

on:
  workflow_dispatch:
  schedule:
    # 每月 1 號 01:00 UTC（台灣 09:00）
    - cron: '0 1 1 * *'

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ 拿 repo 內容
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2️⃣ 設定 Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # 3️⃣ 安裝套件
      - name: Install dependencies
        run: |
          pip install feedparser python-docx requests

      # 4️⃣ 跑你的 main.py（新增了 GEMINI_API_KEY 環境變數）
      - name: Run main script
        run: python main.py
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}

      # 5️⃣ 把產出的檔案存回 repo（CSV / docx）
      - name: Commit output files
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          # 使用 --force 或檢查檔案是否存在以避免 git add 失敗
          git add news_*.csv report_*.docx || echo "No files to add"
          git commit -m "Monthly auto-generated industry report" || echo "No changes to commit"
          git push
