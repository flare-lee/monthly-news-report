name: Run Python

permissions:
  contents: write

on:
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install feedparser python-docx

      - name: Run main script
        run: python main.py
        env:
           EMAIL_USER: ${{ secrets.EMAIL_USER }}
           EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
           EMAIL_TO: ${{ secrets.EMAIL_TO }}

      - name: Commit CSV
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add *.csv
          git commit -m "Add monthly news CSV" || echo "No changes"
          git push
          
      - name: Commit report
        run: |
          git add report_*.txt
          git commit -m "Add monthly analysis report" || echo "No report to commit"
          git push
